version: '3.8'

services:
  bot:
    build: .
    container_name: truth-md-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - .env
    volumes:
      - bot_sessions:/app/sessions
      - bot_data:/app/data
      - bot_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: truth-md-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/letsencrypt
      - nginx_certs_data:/var/www/certbot
    depends_on:
      - bot

volumes:
  bot_sessions:
  bot_data:
  bot_logs:
  nginx_certs:
  nginx_certs_data:
