<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRUTH-MD | WhatsApp Pairing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js">
    const deleteBtn = document.getElementById('delete-btn');
    
    deleteBtn.addEventListener('click', async () => {
      const num = phoneInput.value.replace(/\D/g,'');
      if (!num) { swal('Error', 'Please enter your WhatsApp number to delete its session.', 'error'); return; }
      
      const confirm = await swal({
        title: "Are you sure?",
        text: `This will delete the session for ${num} from the database and local storage.`,
        icon: "warning",
        buttons: true,
        dangerMode: true,
      });
      
      if (confirm) {
        deleteBtn.disabled = true;
        try {
          const res = await fetch('/api/delete-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ number: num })
          });
          const d = await res.json();
          if (d.success) {
            swal('Deleted!', d.message, 'success');
          } else {
            swal('Error', d.error || 'Failed to delete session.', 'error');
          }
        } catch (e) {
          swal('Error', 'Network error occurred.', 'error');
        } finally {
          deleteBtn.disabled = false;
        }
      }
    });

  </script>
  <style>
    :root {
      --bg: #0a0a0a;
      --card-bg: #151515;
      --text: #ffffff;
      --accent: #ff0055;
      --accent-hover: #ff3377;
      --secondary: #222;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: var(--card-bg);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      text-align: center;
      border: 1px solid var(--secondary);
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
    p.subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
    .input-group { margin-bottom: 25px; text-align: left; }
    label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; }
    input {
      width: 100%;
      padding: 15px;
      background: var(--bg);
      border: 1px solid var(--secondary);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
    .btn:disabled { background: #444; cursor: not-allowed; transform: none; }
    #pair-result { margin-top: 30px; padding: 20px; background: var(--bg); border-radius: 10px; display: none; }
    #code-display { font-size: 2rem; font-weight: 800; color: var(--accent); letter-spacing: 5px; margin: 15px 0; }
    .loading { display: none; margin: 20px 0; }
    .loading i { font-size: 2rem; color: var(--accent); animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .banner { display: none; background: #00c853; color: #fff; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: 600; }
    .wa-link { color: var(--accent); text-decoration: none; font-size: 0.9rem; display: block; margin-top: 10px; }
    .wa-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TRUTH-MD</h1>
    <p class="subtitle">WhatsApp Pairing Service</p>
    
    <div class="input-group">
      <label for="phone-number">WhatsApp Number</label>
      <input type="text" id="phone-number" placeholder="+254XXXXXXXXX">
    </div>
    
    
    <button id="gen-btn" class="btn">Generate Pairing Code</button>
    <button id="delete-btn" class="btn" style="background:var(--secondary); margin-top:10px; font-size:0.85rem;">Delete Existing Session</button>

    
    <div id="loading" class="loading">
      <i class="fas fa-circle-notch"></i>
      <p style="margin-top:10px; color:#888;">Requesting code...</p>
    </div>
    
    <div id="pair-result">
      <p style="font-size:0.8rem; color:#888;">Your Pairing Code:</p>
      <div id="code-display"></div>
      <button id="copy-btn" class="btn" style="background:var(--secondary); font-size:0.8rem; padding:8px;">Copy Code</button>
      <a id="wa-link" href="#" target="_blank" class="wa-link"><i class="fab fa-whatsapp"></i> Open WhatsApp to link</a>
    </div>

    <div id="connected-banner" class="banner">
      <i class="fas fa-check-circle"></i> Bot Connected!
    </div>
  </div>

  <script>
    const genBtn = document.getElementById('gen-btn');
    const phoneInput = document.getElementById('phone-number');
    const loading = document.getElementById('loading');
    const pairResult = document.getElementById('pair-result');
    const codeDisplay = document.getElementById('code-display');
    const copyBtn = document.getElementById('copy-btn');
    const waLink = document.getElementById('wa-link');
    const connectedBanner = document.getElementById('connected-banner');
    
    let activeStream = null;

    genBtn.addEventListener('click', () => {
      const num = phoneInput.value.replace(/\D/g,'');
      if (!num) { swal('Error', 'Please enter your WhatsApp number with country code.', 'error'); return; }
      
      if (activeStream) { activeStream.close(); }
      
      genBtn.disabled = true;
      loading.style.display = 'block';
      pairResult.style.display = 'none';
      connectedBanner.style.display = 'none';
      
      const evtSource = new EventSource(`/code?number=${num}`);
      activeStream = evtSource;

      evtSource.addEventListener('code', (e) => {
        const d = JSON.parse(e.data);
        const code = d.code;
        loading.style.display = 'none';
        pairResult.style.display = 'block';
        codeDisplay.textContent = code;
        waLink.href = `https://wa.me/${num}?text=${encodeURIComponent(code)}`;
        genBtn.disabled = false;
      });

      evtSource.addEventListener('session', (e) => {
        pairResult.style.display = 'none';
        connectedBanner.style.display = 'block';
        swal('Success!', 'TRUTH-MD is now connected to your WhatsApp.', 'success');
        evtSource.close();
      });

      evtSource.addEventListener('error', (e) => {
        loading.style.display = 'none';
        genBtn.disabled = false;
        if (e.data) {
          try {
            const d = JSON.parse(e.data);
            swal('Error', d.message || 'Connection failed.', 'error');
          } catch(_) { swal('Error', 'Connection failed.', 'error'); }
        }
        evtSource.close();
      });
    });

    copyBtn.addEventListener('click', () => {
      const code = codeDisplay.textContent;
      navigator.clipboard.writeText(code).then(() => {
        const oldText = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = oldText, 2000);
      });
    });

    phoneInput.addEventListener('input', function() {
      let v = this.value.replace(/\D/g,'');
      this.value = v ? '+' + v : '';
    });
  
    const deleteBtn = document.getElementById('delete-btn');
    
    deleteBtn.addEventListener('click', async () => {
      const num = phoneInput.value.replace(/\D/g,'');
      if (!num) { swal('Error', 'Please enter your WhatsApp number to delete its session.', 'error'); return; }
      
      const confirm = await swal({
        title: "Are you sure?",
        text: `This will delete the session for ${num} from the database and local storage.`,
        icon: "warning",
        buttons: true,
        dangerMode: true,
      });
      
      if (confirm) {
        deleteBtn.disabled = true;
        try {
          const res = await fetch('/api/delete-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ number: num })
          });
          const d = await res.json();
          if (d.success) {
            swal('Deleted!', d.message, 'success');
          } else {
            swal('Error', d.error || 'Failed to delete session.', 'error');
          }
        } catch (e) {
          swal('Error', 'Network error occurred.', 'error');
        } finally {
          deleteBtn.disabled = false;
        }
      }
    });

  </script>
</body>
</html>
